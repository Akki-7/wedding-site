<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Charmila & Nithesh</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
  <div class="intro-content">
    <h1 class="intro-names">Charmila & Nithesh</h1>
    <p class="intro-line">are getting married</p>
    <button onclick="enterSite()">View Invitation</button>
  </div>
</div>

<!-- 🌐 MAIN -->
<div id="main-content">

  <!-- HERO TEXT (TOP LEFT) -->
  <section class="hero">
    <div class="hero-text">
      <h1 class="names">Charmila & Nithesh</h1>

      <p class="tagline">
        Together with their families,<br>
        request the honor of your presence<br>
        to celebrate their wedding
      </p>

      <p class="meta">April 30, 2026 · Bobbili</p>
    </div>
  </section>

  <!-- STORY -->
  <section class="story">
    <h2>Our Story</h2>
    <p>
      A simple hello turned into something timeless.<br>
      A journey of love, laughter, and forever.
    </p>
  </section>

  <!-- COUNTDOWN -->
  <section class="countdown">
    <h2 id="timer"></h2>
  </section>

  <!-- VENUE -->
  <section class="venue">
    <a href="https://maps.app.goo.gl/ZGzabn4UBXL36z3i6" target="_blank">
      View Venue
    </a>
  </section>

</div>

<script src="script.js"></script>

</body>
</html>
