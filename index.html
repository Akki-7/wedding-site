<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Invitation</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <h1 data-aos="fade-up">Akshay ❤️ [Partner]</h1>
    <p data-aos="fade-up" data-aos-delay="300">We are getting married</p>
  </section>

  <!-- STORY -->
  <section class="story" data-aos="fade-right">
    <h2>Our Story</h2>
    <p>It all started with...</p>
  </section>

  <!-- EVENT -->
  <section class="event" data-aos="fade-left">
    <h2>Wedding</h2>
    <p>Dec 12, 2026</p>
    <p>Hyderabad, India</p>
  </section>

  <!-- COUNTDOWN -->
  <section class="countdown">
    <h2 id="timer"></h2>
  </section>

  <!-- RSVP -->
  <section class="rsvp" data-aos="zoom-in">
    <a href="#">RSVP Now</a>
  </section>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="script.js"></script>

</body>
</html>
